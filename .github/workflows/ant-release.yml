name: Build and release Javolution Extended artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  deployments: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install JDK 5
      run: |
        chmod +x lib/jdk-1_5_0_22-linux-amd64-direct.bin
        ./lib/jdk-1_5_0_22-linux-amd64-direct.bin

    - name: Build Javolution Extended (J2ME)
      run: |
        ant clean
        ant -Djavac.executable=$(pwd)/jdk1.5.0_22/bin/javac -Djavadoc.executable=$(pwd)/jdk1.5.0_22/bin/javadoc j2me

    - name: Rename J2ME artifact
      run: mv target/javolution-5.7.5.jar javolution-5.7.5_j2me.jar

    - name: Build Javolution Extended (J2SE 1.4+)
      run: |
        ant clean
        ant -Djavac.executable=$(pwd)/jdk1.5.0_22/bin/javac -Djavadoc.executable=$(pwd)/jdk1.5.0_22/bin/javadoc 1.4

    - name: Rename J2SE 1.4 artifact
      run: mv target/javolution-5.7.5.jar javolution-5.7.5_jdk4.jar

    - name: Build Javolution Extended (J2SE 1.5+)
      run: |
        ant clean
        ant -Djavac.executable=$(pwd)/jdk1.5.0_22/bin/javac -Djavadoc.executable=$(pwd)/jdk1.5.0_22/bin/javadoc 1.5

    - name: Rename J2SE 1.5 artifact
      run: mv target/javolution-5.7.5.jar javolution-5.7.5_jdk5.jar

    - name: Install JDK 6
      run: |
        chmod +x lib/jdk-6u45-linux-x64.bin
        ./lib/jdk-6u45-linux-x64.bin

    - name: Build Javolution Extended (J2SE 1.6+)
      run: |
        ant clean
        ant -Djavac.executable=$(pwd)/jdk1.6.0_45/bin/javac -Djavadoc.executable=$(pwd)/jdk1.6.0_45/bin/javadoc 1.6

    - name: Rename J2SE 1.6 artifact
      run: mv target/javolution-5.7.5.jar javolution-5.7.5_jdk6.jar

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v5.7.5
        release_name: v5.7.5
        prerelease: false

    - name: Upload J2ME artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./javolution-5.7.5_j2me.jar
        asset_name: javolution-5.7.5_j2me.jar
        asset_content_type: application/java-archive

    - name: Upload J2SE 1.4 artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./javolution-5.7.5_jdk4.jar
        asset_name: javolution-5.7.5_jdk4.jar
        asset_content_type: application/java-archive

    - name: Upload J2SE 1.5 artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./javolution-5.7.5_jdk5.jar
        asset_name: javolution-5.7.5_jdk5.jar
        asset_content_type: application/java-archive

    - name: Upload J2SE 1.6 artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./javolution-5.7.5_jdk6.jar
        asset_name: javolution-5.7.5_jdk6.jar
        asset_content_type: application/java-archive

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v6

    - name: Upload API docs artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: target/site/apidocs/
        include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5